<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Kehilat Yaakov favicon">
  <!-- White rounded-square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="#ffffff" />
  <!-- Left vertical stroke + top arching curve (top of kaf כ) -->
  <path
    d="M 20,52 L 20,30 Q 21,18 28,15 Q 40,11 52,21"
    fill="none"
    stroke="#000000"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Bottom stroke with small bump at end -->
  <path
    d="M 20,52 Q 30,56 40,53 Q 46,50 48,46"
    fill="none"
    stroke="#000000"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
